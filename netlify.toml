[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = "https://mku-qr-attendance-1.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://mku-qr-attendance-1.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
